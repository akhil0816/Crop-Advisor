version: "3.9"

services:

  backend:
    image: ${DOCKER_USER}/crop-backend:latest
    container_name: backend
    restart: always

  frontend:
    image: ${DOCKER_USER}/crop-frontend:latest
    container_name: frontend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend